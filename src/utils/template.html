<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: #333;
      padding: 20px;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .info-box {
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 12px;
    }

    .info-box label {
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }

    .info-box span {
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th {
      background: #f3f4f6;
      text-align: left;
      padding: 8px;
      font-size: 11px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 11px;
    }

    .notes {
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 4px;
      padding: 12px;
    }

    .notes label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 10px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>{{title}}</h1>
  </div>

  <div class="info-grid">
    <div class="info-box">
      <label>Destinatário</label>
      <span>{{recipient_name}}</span>
    </div>
    <div class="info-box">
      <label>Documento</label>
      <span>{{recipient_document}}</span>
    </div>
    <div class="info-box">
      <label>Data de Entrega</label>
      <span>{{delivery_date}}</span>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Descrição</th>
        <th>Quantidade</th>
        <th>Unidade</th>
      </tr>
    </thead>
    <tbody>
      {{items}}
    </tbody>
  </table>

  <div class="notes">
    <label>Observações</label>
    <p>{{notes}}</p>
  </div>

  <div class="footer">
    <p>Documento gerado em {{delivery_date}}</p>
  </div>
</body>

</html>
